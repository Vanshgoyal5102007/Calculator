<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator | The Web Calculator</title>
    <link rel="stylesheet" href="./style.css">
    <script src = "./script.js" defer></script>
</head>
<body>
    <div class="calc-container">
        <div class="display-container">
            <div class="sign-display"></div>
            <div class="calc-display"></div>
        </div>

        <div class="all-button-container">
            <div class="clear-backspace-container">
                <button class="clear-btn">Clear</button>
                <button class="backspace-btn">Backspace</button>
            </div>

            <div class="main-button-container">
                <div class="number-btn-container">
                    <div class="first-row">
                    <button class="number-btn">1</button>
                    <button class="number-btn">2</button>
                    <button class="number-btn">3</button>
                    </div>
                    <div class="second-row">
                    <button class="number-btn">4</button>
                    <button class="number-btn">5</button>
                    <button class="number-btn">6</button>
                    </div>
                    <div class="third-row">
                    <button class="number-btn">7</button>
                    <button class="number-btn">8</button>
                    <button class="number-btn">9</button>
                    </div>
                    <div class="fourth-row">
                    <button class="number-btn">0</button>
                    <button class="number-btn">.</button>
                    </div>
                </div>
                
                <div class="operator-btn-container">
                    <button class="operator-btn">+</button>
                    <button class="operator-btn">-</button>
                    <button class="operator-btn">*</button>
                    <button class="operator-btn">÷</button>
                </div>
            </div>

            <button class="equal-btn">=</button>
        </div>
    </div>
    <p class="noob-alert"></p>
</body>
</html>
